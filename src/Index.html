<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f4f0; --surface: #fff; --text: #1a1a1a; --text2: #555; --text3: #999;
  --accent: #2563eb; --accent-light: #dbeafe; --border: #e0e0e0; --green: #16a34a; --red: #dc2626;
  --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,.06);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* ---------- Login Gate ---------- */
#login-gate { position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center; }
.login-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:320px;max-width:90vw;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.08); }
.login-card h2 { font-size:20px;font-weight:700;margin-bottom:4px; }
.login-card p { font-size:13px;color:var(--text2);margin-bottom:20px; }
.login-card input { width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;outline:none;text-align:center;letter-spacing:2px; }
.login-card input:focus { border-color:var(--accent); }
.login-card button { width:100%;margin-top:12px;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer; }
.login-card button:active { opacity:.9; }
.login-card .login-error { color:var(--red);font-size:13px;margin-top:10px;min-height:18px; }

html { font-family: var(--font); color: var(--text); background: var(--bg); line-height: 1.5; -webkit-font-smoothing: antialiased; }
body { min-height: 100dvh; }

/* Header */
.header { position: sticky; top: 0; z-index: 10; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; }
.header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.header h1 { font-size: 17px; font-weight: 700; white-space: nowrap; }
.book-count { font-size: 12px; color: var(--text3); font-variant-numeric: tabular-nums; }
.spacer { flex: 1; }
.btn-icon { width: 34px; height: 34px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); }
.btn-icon:active { background: var(--bg); }
.btn-lang { font-size: 12px; width: auto; padding: 0 8px; font-weight: 600; }
.search-box { width: 250px; display: flex; gap: 4px; }
.search-box input { flex: 1; min-width: 0; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--bg); outline: none; }
.search-box input:focus { border-color: var(--accent); }
.search-box select { font-size: 12px; padding: 0 4px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text2); outline: none; cursor: pointer; }

/* Toolbar — single compact row */
.toolbar { max-width: 1200px; margin: 0 auto; padding: 8px 16px; display: flex; gap: 6px; flex-wrap: nowrap; align-items: center; overflow-x: auto; }
.toolbar select { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); cursor: pointer; outline: none; flex-shrink: 0; }
.toolbar select:focus { border-color: var(--accent); }
.toolbar label { font-size: 11px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }
.toolbar .sep { color: var(--border); font-size: 14px; margin: 0 2px; flex-shrink: 0; }
.btn-sort-dir { border: none; background: none; font-size: 15px; cursor: pointer; color: var(--accent); padding: 2px 4px; line-height: 1; flex-shrink: 0; }
.btn-sort-dir:hover { color: var(--text); }

/* Book Grid — bigger cards */
.book-grid { max-width: 1200px; margin: 0 auto; padding: 0 16px 16px; display: grid; gap: 12px; grid-template-columns: repeat(4, 1fr); }
.book-card { display: flex; gap: 12px; padding: 14px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); cursor: pointer; overflow: hidden; }
.book-card:active { opacity: .92; }
.thumb { flex-shrink: 0; width: 56px; height: 80px; border-radius: 3px; overflow: hidden; background: #e8e8e8; display: flex; align-items: center; justify-content: center; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb .ph { font-size: 10px; color: var(--text3); user-select: none; text-align: center; line-height: 1.2; }
.card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.card-title { font-size: 14px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
.card-author { font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-meta { display: flex; gap: 6px; align-items: center; font-size: 11px; color: var(--text3); margin-top: auto; }
.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 0 5px; border-radius: 3px; line-height: 1.6; }
.badge.ok { background: #dcfce7; color: var(--green); }
.badge.out { background: #fef2f2; color: var(--red); }
.badge.shelf { background: var(--accent-light); color: var(--accent); }

/* Pagination */
.pagination { max-width: 1200px; margin: 0 auto; padding: 12px 16px 24px; display: flex; justify-content: center; gap: 4px; }
.pagination button { min-width: 32px; height: 32px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-size: 13px; cursor: pointer; color: var(--text); }
.pagination button:disabled { opacity: .4; cursor: default; }
.pagination button.current { background: var(--accent); color: #fff; border-color: var(--accent); }
.pagination .page-info { font-size: 12px; color: var(--text3); margin: 0 8px; }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 50; }
.modal-bg.open { display: flex; align-items: center; justify-content: center; }
.modal { background: var(--surface); border-radius: 12px; width: 90%; max-width: 480px; max-height: 85dvh; overflow-y: auto; z-index: 60; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,.18); }
.modal-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text3); padding: 0 4px; line-height: 1; }
.modal-close:hover { color: var(--text); }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; padding-right: 28px; }
.modal-author { font-size: 14px; color: var(--text2); margin-bottom: 16px; }
.modal-thumb { text-align: center; margin-bottom: 16px; }
.modal-thumb img { max-height: 160px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
.detail-table { width: 100%; font-size: 13px; border-collapse: collapse; }
.detail-table td { padding: 5px 0; vertical-align: top; }
.detail-table td:first-child { color: var(--text3); width: 80px; white-space: nowrap; padding-right: 10px; }
.detail-table td:last-child { word-break: break-all; }
.lending-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.lending-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.lending-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.lending-row label { font-size: 13px; color: var(--text2); width: 80px; flex-shrink: 0; }
.lending-row select, .lending-row input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; outline: none; }
.lending-row select:focus, .lending-row input:focus { border-color: var(--accent); }
.btn-save { display: block; width: 100%; margin-top: 12px; padding: 9px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-save:active { opacity: .9; }
.btn-save:disabled { opacity: .5; cursor: default; }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); grid-column: 1 / -1; }

/* Register */
.register-body { max-width: 560px; margin: 0 auto; padding: 16px; }
.reg-section { margin-bottom: 20px; }
.reg-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.shelf-dropdowns { display: flex; align-items: center; gap: 6px; }
.shelf-dropdowns select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; font-weight: 600; background: var(--surface); outline: none; min-width: 70px; cursor: pointer; }
.shelf-dropdowns select:focus { border-color: var(--accent); }
.shelf-sep { font-size: 16px; font-weight: 600; color: var(--text3); }
.shelf-display { font-size: 13px; color: var(--text2); margin-top: 6px; }
.mode-tabs { display: flex; }
.mode-tab { flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--surface); font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text2); text-align: center; }
.mode-tab:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.mode-tab:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.mode-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
#barcode-reader { display: none; }
.scan-status { text-align: center; padding: 8px; font-size: 13px; color: var(--text2); }
.scan-status.error { color: var(--red); }
.scan-status.ok { color: var(--green); }
.btn-start-camera { display: block; width: 100%; max-width: 400px; margin: 12px auto; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-start-camera:active { opacity: .9; }
.btn-start-camera:disabled { opacity: .5; cursor: default; }
.scan-result { max-width: 400px; margin: 12px auto; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
.scan-result .sr-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.scan-result .sr-meta { font-size: 13px; color: var(--text2); }
.scan-result .sr-status { font-size: 12px; font-weight: 600; margin-top: 6px; }
.scan-result .sr-status.ok { color: var(--green); }
.scan-result .sr-status.pending { color: var(--accent); }
.scan-result .sr-status.error { color: var(--red); }
.scan-result .sr-retry { margin-left: 8px; padding: 2px 10px; font-size: 12px; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.form-row .req { color: var(--red); }
.form-row input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; outline: none; }
.form-row input:focus { border-color: var(--accent); }
.input-with-btn { display: flex; gap: 6px; }
.input-with-btn input { flex: 1; }
.btn-small { padding: 8px 14px; border: 1px solid var(--accent); border-radius: var(--radius); background: var(--surface); color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-small:active { background: #eff6ff; }
.btn-small:disabled { opacity: .5; cursor: default; }
.fetch-status { font-size: 13px; color: var(--text2); margin: 6px 0; min-height: 20px; }
.fetch-status.error { color: var(--red); }
.fetch-status.ok { color: var(--green); }

/* Toast */
#toast-wrap { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
.toast { padding: 10px 18px; border-radius: 8px; background: #323232; color: #fff; font-size: 13px; font-weight: 600; box-shadow: 0 4px 12px rgba(0,0,0,.25); max-width: 90vw; opacity: 0; transform: translateY(8px); transition: opacity .25s, transform .25s; }
.toast.show { opacity: 1; transform: none; }
.toast.ok { background: var(--green); }
.toast.error { background: var(--red); }

@media (max-width: 960px) { .book-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 680px) { .book-grid { grid-template-columns: repeat(2, 1fr); } .search-box { width: 100%; order: 10; } .toolbar .sep { display: none; } .toolbar { gap: 4px; } }
@media (max-width: 480px) { .book-grid { grid-template-columns: 1fr; } .toolbar label { font-size: 10px; } .toolbar select { font-size: 11px; padding: 3px 6px; } }
</style>
</head>
<body>

<!-- ========== LOGIN GATE (hidden if no password) ========== -->
<div id="login-gate" style="display:none;">
  <div class="login-card">
    <h2 id="login-title"></h2>
    <p id="login-subtitle">パスワードを入力してください</p>
    <input type="password" id="login-pw" autocomplete="off" placeholder="Password">
    <button id="login-btn">OK</button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<!-- ========== LIST VIEW ========== -->
<div id="view-list">
  <header class="header">
    <div class="header-inner">
      <h1 id="site-name"></h1>
      <span id="book-count" class="book-count"></span>
      <span class="spacer"></span>
      <div class="search-box">
        <select id="search-scope"></select>
        <input type="text" id="search-input">
      </div>
      <button id="btn-lang" class="btn-icon btn-lang">EN</button>
      <button id="btn-add" class="btn-icon" aria-label="Add">＋</button>
    </div>
  </header>

  <div class="toolbar">
    <label id="lbl-sort"></label>
    <select id="sort-key"></select>
    <button id="sort-dir" class="btn-sort-dir">↓</button>
    <span class="sep">|</span>
    <label id="lbl-lang-filter"></label>
    <select id="filter-lang"></select>
    <span class="sep">|</span>
    <label id="lbl-status-filter"></label>
    <select id="filter-status"></select>
    <span class="sep">|</span>
    <label id="lbl-shelf-filter"></label>
    <select id="filter-shelf"></select>
    <span class="sep">|</span>
    <label id="lbl-genre-filter"></label>
    <select id="filter-genre"></select>
  </div>

  <main id="book-grid" class="book-grid"></main>
  <nav id="pagination" class="pagination"></nav>

  <div id="modal-bg" class="modal-bg">
    <div class="modal">
      <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
      <div id="modal-thumb" class="modal-thumb"></div>
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-author" class="modal-author"></div>
      <table class="detail-table"><tbody id="detail-table"></tbody></table>
      <div class="lending-section">
        <h3 id="lbl-lending"></h3>
        <div class="lending-row">
          <label id="lbl-status"></label>
          <select id="lending-status"></select>
        </div>
        <div class="lending-row" id="borrower-row">
          <label id="lbl-borrower"></label>
          <input type="text" id="lending-borrower">
        </div>
        <button id="btn-save-lending" class="btn-save"></button>
      </div>
    </div>
  </div>
</div>

<!-- ========== REGISTER VIEW ========== -->
<div id="view-register" style="display:none;">
  <header class="header">
    <div class="header-inner">
      <button id="btn-back" class="btn-icon" aria-label="Back">←</button>
      <h1 id="reg-title"></h1>
    </div>
  </header>
  <div class="register-body">
    <section class="reg-section">
      <h2 id="lbl-shelf"></h2>
      <div class="shelf-dropdowns">
        <select id="shelf-prefix"></select>
        <span class="shelf-sep">-</span>
        <select id="shelf-number"></select>
      </div>
      <div id="shelf-display" class="shelf-display"></div>
    </section>
    <section class="reg-section">
      <div class="mode-tabs">
        <button id="tab-barcode" class="mode-tab active"></button>
        <button id="tab-manual" class="mode-tab"></button>
      </div>
    </section>
    <section id="panel-barcode" class="reg-section">
      <button id="btn-scan-start" class="btn-start-camera"></button>
      <div id="barcode-status" class="scan-status"></div>
      <div id="scan-result"></div>
    </section>
    <section id="panel-manual" class="reg-section" style="display:none;">
      <div class="form-row">
        <label>ISBN</label>
        <div class="input-with-btn">
          <input type="text" id="man-isbn" placeholder="ISBN-13 / ISBN-10">
          <button id="btn-fetch-isbn" class="btn-small"></button>
        </div>
      </div>
      <div id="man-fetch-status" class="fetch-status"></div>
      <div class="form-row"><label id="lbl-man-title"></label><input type="text" id="man-title"></div>
      <div class="form-row"><label id="lbl-man-author"></label><input type="text" id="man-author"></div>
      <div class="form-row"><label id="lbl-man-publisher"></label><input type="text" id="man-publisher"></div>
      <div class="form-row"><label id="lbl-man-pubdate"></label><input type="text" id="man-pubdate"></div>
      <div class="form-row"><label id="lbl-man-genre"></label><input type="text" id="man-genre"></div>
      <div class="form-row"><label id="lbl-man-language"></label><input type="text" id="man-language" value="ja"></div>
      <div class="form-row"><label id="lbl-man-note"></label><input type="text" id="man-note"></div>
      <button id="btn-manual-register" class="btn-save"></button>
      <div id="man-register-status" class="fetch-status"></div>
    </section>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ============================================================
  // CONFIG — siteName is injected from webapp.js SITE_NAME
  // ============================================================
  const CONFIG = {
    siteName: '<?= siteName ?>',      // webapp.js の SITE_NAME から自動設定
    defaultLang: 'ja',                // 'ja' or 'en'
    theme: 'blue'                     // 'blue' | 'green' | 'purple' | 'warm'
  };

  // ============================================================
  // Color Themes
  // ============================================================
  const THEMES = {
    blue:    { bg:'#eef2f7', surface:'#fff', text:'#1a1a1a', text2:'#4a5568', text3:'#a0aec0', accent:'#3182ce', accentLight:'#bee3f8', border:'#d2d6dc', green:'#16a34a', red:'#e53e3e' },
    green:   { bg:'#f0f9f4', surface:'#fff', text:'#1a1a1a', text2:'#4a5c50', text3:'#9ca3a0', accent:'#059669', accentLight:'#d1fae5', border:'#d4e4dc', green:'#059669', red:'#dc2626' },
    purple:  { bg:'#f5f0fa', surface:'#fff', text:'#1a1a1a', text2:'#5b4a6e', text3:'#a39bb5', accent:'#7c3aed', accentLight:'#ede9fe', border:'#ddd6e8', green:'#16a34a', red:'#dc2626' },
    warm:    { bg:'#faf5f0', surface:'#fff', text:'#1a1a1a', text2:'#6b5b4d', text3:'#a89888', accent:'#c2410c', accentLight:'#ffedd5', border:'#e6ddd4', green:'#16a34a', red:'#dc2626' }
  };

  function applyTheme(name) {
    const th = THEMES[name];
    if (!th) return;
    const r = document.documentElement.style;
    r.setProperty('--bg', th.bg);
    r.setProperty('--surface', th.surface);
    r.setProperty('--text', th.text);
    r.setProperty('--text2', th.text2);
    r.setProperty('--text3', th.text3);
    r.setProperty('--accent', th.accent);
    r.setProperty('--accent-light', th.accentLight);
    r.setProperty('--border', th.border);
    r.setProperty('--green', th.green);
    r.setProperty('--red', th.red);
  }

  // ============================================================
  // i18n
  // ============================================================
  const T = {
    ja: {
      search: '検索…', sort: '並び替え', registeredAt: '登録日時', pubdate: '出版年',

      publisherLabel: '出版社', pubdateLabel: '出版年月', genreLabel: 'ジャンル',
      languageLabel: '言語', noteLabel: '備考', registerBtn: '登録',
      lending: '貸出管理', status: '状態', borrower: '借りている人', update: '更新',
      updated: '更新しました', updateFail: '更新に失敗しました',
      isbn: 'ISBN', publisher: '出版社', pubdateDetail: '出版年月', genre: 'ジャンル',
      language: '言語', shelfDetail: '棚', regDate: '登録日時', note: '備考',
      registering: '登録中…', registered: '登録済', failed: '失敗', undo: '取消',
      queued: '待機中', retry: '再試行',
      errBadIsbn: 'ISBNが正しくありません', errNoHit: '書誌情報が見つかりませんでした',
      startCamera: 'スキャン開始', scanStop: '停止', cameraStarting: 'カメラを起動中…', cameraFail: 'カメラ起動失敗',
      scannerUnavail: 'スキャナーを初期化できません', notIsbn: 'ISBN-13ではないバーコード',
      notFoundManual: '見つかりませんでした。手動で入力して登録してください', regComplete: '登録完了',
      regFail: '登録失敗', isbnOrTitleReq: 'ISBNまたはタイトルは必須です',
      selectShelf: '棚を選択してください', items: '冊',
      pubdatePlaceholder: '例: 2024-03', authorPlaceholder: '著者（カンマ区切り）',
      langPlaceholder: 'ja / en 等', toggleLang: 'EN'
    },
    en: {
      search: 'Search…', sort: 'Sort', registeredAt: 'Date added', pubdate: 'Year',
      titleSort: 'Title', desc: 'Desc', asc: 'Asc', langFilter: 'Lang',

  let lang = CONFIG.defaultLang;

  // ============================================================
  // State
  // ============================================================
  const PAGE_SIZE = 24;
  let allBooks = [], filteredBooks = [], currentPage = 1;
  let sortKey = 'registeredAt', sortAsc = false;
  let filterLang = 'all', filterStatus = 'all', filterShelf = 'all', filterGenre = 'all';
  let searchQuery = '', searchScope = 'all';
  let shelves = [], selectedShelf = '';
  const jaCollator = (typeof Intl !== 'undefined' && Intl.Collator) ? new Intl.Collator('ja') : null;

  const isGAS = (typeof google !== 'undefined' && google.script && google.script.run);
  let authToken = '';

  function gasRun(fn, ...args) {
    args.push(authToken); // サーバー側は末尾引数でトークン検証（不要な関数では無視される）
    return { then(ok, fail) {
      const onFail = (e) => {
        if (e && /AUTH_REQUIRED/.test(e.message || '')) { handleAuthExpired(); return; }
        (fail || ((err) => console.error(fn, err)))(e);
      };
      const r = google.script.run.withSuccessHandler(ok).withFailureHandler(onFail);
      r[fn](...args);
    }};
  }

  // トークン期限切れ（6時間）: ゲートを再表示し、再ログイン後にリロード
  function handleAuthExpired() {
    authToken = '';
    try { sessionStorage.removeItem('hondana-auth'); } catch(e) {}
    showLoginGate(() => location.reload());
  }

  function loadBooks(cb) {
    if (isGAS) gasRun('getAllBooks').then((d) => { allBooks = d || []; cb(); });
    else { allBooks = (typeof MOCK_BOOKS !== 'undefined') ? MOCK_BOOKS : []; cb(); }
  }
  function loadShelves(cb) {
    if (isGAS) gasRun('getShelves').then((d) => { shelves = d || []; cb(); });
    else {
      shelves = [];
      for (const l of ['A','B','C','D','E','F','G','H','P']) {
        for (let i = 1; i <= 5; i++) shelves.push(`${l}-${i}`);
      }
      cb();
    }
  }
  function registerByIsbn(isbn, shelf, cb) {
    if (isGAS) gasRun('registerBookByIsbn', isbn, shelf).then(cb, (e) => cb({ success: false, error: (e && e.message) || '' }));
    else {
      setTimeout(() => {
        const r = { id: `m-${Date.now()}`, registeredAt: new Date().toLocaleString('ja-JP'), isbn: isbn, title: `(mock) ${isbn}`, author: '', publisher: '', pubdate: '', genre: '', language: 'ja', shelf: shelf, status: '在庫', borrower: '', updatedAt: '', note: '', thumbnailUrl: '' };
        cb({ success: true, row: r });
      }, 800);
    }
  }
  function registerManual(data, cb) {
    if (isGAS) gasRun('registerBookManual', data).then(cb, (e) => cb({ success: false, error: (e && e.message) || '' }));
    else {
      const r = Object.assign({ id: `m-${Date.now()}`, registeredAt: new Date().toLocaleString('ja-JP'), status: '在庫', borrower: '', updatedAt: '', thumbnailUrl: '' }, data);
      cb({ success: true, row: r });
    }
  }

  // サーバーの失敗結果からユーザー向けメッセージを組み立てる
  function regErrorText(res) {
    const errs = (res && res.debug && res.debug.errors) || [];
    const s = (res && res.error) || errs.join('; ');
    if (/check digit|10 or 13 digits/i.test(s)) return t('errBadIsbn');
    if (/No results/i.test(s)) return t('errNoHit');
    return s || t('regFail');
  }

  // ============================================================
  // Init
  // ============================================================
  function init() {
    // Apply configured theme
    applyTheme(CONFIG.theme);

    // Auth check
    checkAuth(() => {
      applyLabels();
      document.getElementById('book-grid').innerHTML = `<div class="empty">${t('loading')}</div>`;
      loadBooks(() => { updateFilterOptions(); applyFilters(); });
      loadShelves(() => {}); // 棚データを先読み
      bindListEvents();
      bindRegisterEvents();
    });

  // ============================================================
  // Password Authentication
  // ============================================================
  function checkAuth(onReady) {
    if (!isGAS) { onReady(); return; }

    // Check if password is required
    gasRun('isPasswordRequired').then((required) => {
      if (!required) { onReady(); return; }

      // 保存済みトークンがあれば楽観的に通す（期限切れならサーバーが弾いて再ログイン）
      let saved = ''; try { saved = sessionStorage.getItem('hondana-auth') || ''; } catch(e) {}
      if (saved && saved !== 'ok') { authToken = saved; onReady(); return; }

      showLoginGate(onReady);
    }, () => { onReady(); }); // If server call fails, skip auth
  }

  let loginGateBound = false, loginOnReady = null;
  function showLoginGate(onReady) {
    loginOnReady = onReady;
    const gate = document.getElementById('login-gate');
    gate.style.display = '';
    const pwInput = document.getElementById('login-pw');
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    document.getElementById('login-title').textContent = CONFIG.siteName;

    function submit() {
      const pw = pwInput.value;
      if (!pw) return;
      btn.disabled = true; btn.textContent = '...';
      errEl.textContent = '';
      gasRun('checkAppPassword', pw).then((token) => {
        btn.disabled = false; btn.textContent = 'OK';
        if (token) {
          authToken = token;
          try { sessionStorage.setItem('hondana-auth', token); } catch(e) {}
          gate.style.display = 'none';
          if (loginOnReady) loginOnReady();
        } else {
          errEl.textContent = lang === 'ja' ? 'パスワードが違います' : 'Incorrect password';
          pwInput.value = '';
          pwInput.focus();
        }
      }, () => {
        btn.disabled = false; btn.textContent = 'OK';
        errEl.textContent = 'Error';
      });
    }
    if (!loginGateBound) {
      loginGateBound = true;
      btn.addEventListener('click', submit);
      pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
    }
    pwInput.focus();
  }

  function showView(name) {
    document.getElementById('view-list').style.display = (name === 'list') ? '' : 'none';
    document.getElementById('view-register').style.display = (name === 'register') ? '' : 'none';
    if (name === 'register') initRegisterView();
  }

  // ============================================================
  // LIST VIEW
  // ============================================================
  function bindListEvents() {
    document.getElementById('search-input').addEventListener('input', (e) => { searchQuery = e.target.value; currentPage = 1; applyFilters(); });
    document.getElementById('search-scope').addEventListener('change', (e) => { searchScope = e.target.value; currentPage = 1; applyFilters(); });
    document.getElementById('sort-key').addEventListener('change', (e) => { sortKey = e.target.value; currentPage = 1; applyFilters(); });
    document.getElementById('sort-dir').addEventListener('click', (e) => { sortAsc = !sortAsc; e.currentTarget.textContent = sortAsc ? '↑' : '↓'; currentPage = 1; applyFilters(); });
    document.getElementById('filter-lang').addEventListener('change', (e) => { filterLang = e.target.value; currentPage = 1; applyFilters(); });
    document.getElementById('filter-status').addEventListener('change', (e) => { filterStatus = e.target.value; currentPage = 1; applyFilters(); });
    document.getElementById('filter-shelf').addEventListener('change', (e) => { filterShelf = e.target.value; currentPage = 1; applyFilters(); });
    document.getElementById('filter-genre').addEventListener('change', (e) => { filterGenre = e.target.value; currentPage = 1; applyFilters(); });
    document.getElementById('modal-bg').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('btn-save-lending').addEventListener('click', saveLending);
    document.getElementById('btn-add').addEventListener('click', () => showView('register'));
    document.getElementById('btn-lang').addEventListener('click', () => {
      lang = (lang === 'ja') ? 'en' : 'ja';
      applyLabels(); applyFilters();
    });
  }

  function applyFilters() {
    // スペース区切り AND 検索。クエリ・対象文字列とも norm() で正規化して比較
    const tokens = norm(searchQuery).split(/\s+/).filter(Boolean);
    filteredBooks = allBooks.filter((b) => {
      if (filterLang === 'ja' && b.language !== 'ja' && b.language !== '') return false;
      if (filterLang === 'en' && b.language !== 'en') return false;
      if (filterLang === 'other' && (b.language === 'ja' || b.language === 'en' || b.language === '')) return false;
      if (filterStatus !== 'all' && b.status !== filterStatus) return false;
      if (filterShelf !== 'all' && b.shelf !== filterShelf) return false;
      if (filterGenre !== 'all' && splitGenres(b.genre).indexOf(filterGenre) === -1) return false;
      if (tokens.length) {
        let fields;
        if (searchScope === 'title') fields = [b.title];
        else if (searchScope === 'author') fields = [b.author];
        else if (searchScope === 'publisher') fields = [b.publisher];
        else fields = [b.title, b.author, b.isbn, b.publisher, b.shelf, b.genre, b.note];
        const h = norm(fields.join(' '));
        for (const token of tokens) { if (h.indexOf(token) === -1) return false; }
      }
      return true;
    });
    sortBooks(filteredBooks);
    renderList();
  }

  function sortBooks(list) {
    list.sort((a, b) => {
      let c;
      if (sortKey === 'title') {
        c = jaCollator ? jaCollator.compare(a.title || '', b.title || '')
          : ((a.title || '') < (b.title || '') ? -1 : ((a.title || '') > (b.title || '') ? 1 : 0));
      } else if (sortKey === 'pubdate') {
        const ka = pubdateKey(a.pubdate), kb = pubdateKey(b.pubdate);
        c = (ka[0] - kb[0]) || (ka[1] - kb[1]) || (ka[2] - kb[2]);
      } else {
        c = dateTs(a.registeredAt) - dateTs(b.registeredAt);
      }
      return sortAsc ? c : -c;
    });
  }

  // '2024' / '2024-03' / '2024.3.15' などを [年,月,日] に。欠損は 0
  function pubdateKey(d) {
    const m = String(d || '').match(/(\d{4})(?:\D+(\d{1,2}))?(?:\D+(\d{1,2}))?/);
    if (!m) return [0, 0, 0];
    return [+m[1], +(m[2] || 0), +(m[3] || 0)];
  }

  // シートのロケール次第で getDisplayValues の日時形式が変わる（ゼロ埋めなし等）ため、
  // 文字列比較ではなく Date にパースして比較する
  function dateTs(v) {
    if (!v) return 0;
    let ts = new Date(v).getTime();
    if (isNaN(ts)) ts = new Date(String(v).replace(/-/g, '/')).getTime();
    return isNaN(ts) ? 0 : ts;
  }

  function splitGenres(g) { return String(g || '').split(/[,、]\s*/).filter(Boolean); }

  // NFKC正規化 + 小文字化 + カタカナ→ひらがな（かな違いでもヒットさせる）
  function norm(s) {
    if (!s) return '';
    s = String(s);
    if (s.normalize) s = s.normalize('NFKC');
    s = s.toLowerCase().trim();
    return s.replace(/[ァ-ヶ]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0x60));
  }

  // 棚・ジャンルフィルタの選択肢を allBooks から再構築（選択値は維持）
  function updateFilterOptions() {
    const shelfSel = document.getElementById('filter-shelf');
    const genreSel = document.getElementById('filter-genre');
    const shelfOpts = [], genreOpts = [];
    for (const b of allBooks) {
      if (b.shelf && shelfOpts.indexOf(b.shelf) === -1) shelfOpts.push(b.shelf);
      for (const g of splitGenres(b.genre)) { if (genreOpts.indexOf(g) === -1) genreOpts.push(g); }
    }
    shelfOpts.sort();
    genreOpts.sort((a, b) => jaCollator ? jaCollator.compare(a, b) : (a < b ? -1 : 1));
    const rebuild = (sel, items, cur) => {
      sel.innerHTML = `<option value="all">${t('all')}</option>`
        + items.map((v) => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
      sel.value = items.indexOf(cur) !== -1 ? cur : 'all';
      return sel.value;
    };
    filterShelf = rebuild(shelfSel, shelfOpts, filterShelf);
    filterGenre = rebuild(genreSel, genreOpts, filterGenre);
  }

  function renderList() {
    const tp = Math.max(1, Math.ceil(filteredBooks.length / PAGE_SIZE));
    if (currentPage > tp) currentPage = tp;
    const start = (currentPage - 1) * PAGE_SIZE;
    const pg = filteredBooks.slice(start, start + PAGE_SIZE);
    document.getElementById('book-count').textContent = `${filteredBooks.length} / ${allBooks.length} ${t('items')}`;
    const grid = document.getElementById('book-grid');
    if (!pg.length) { grid.innerHTML = `<div class="empty">${t('noBooks')}</div>`; }
    else {
      grid.innerHTML = pg.map(renderCard).join('');
      grid.querySelectorAll('.book-card').forEach((el) => el.addEventListener('click', () => openModal(el.dataset.id)));
    }
    renderPagination(tp);
  }

  function renderCard(b) {
    const yr = extractYear(b.pubdate), lent = b.status === '貸出中';
    const th = b.thumbnailUrl ? `<img src="${esc(b.thumbnailUrl)}" alt="" loading="lazy">` : `<span class="ph">${t('noCover')}</span>`;
    return `<div class="book-card" data-id="${esc(b.id)}"><div class="thumb">${th}</div><div class="card-body">`
      + `<div class="card-title">${esc(b.title || '(—)')}</div>`
      + `<div class="card-author">${esc(b.author || '—')}</div>`
      + `<div class="card-meta"><span>${esc(yr)}</span>`
      + (b.shelf ? `<span class="badge shelf">${esc(b.shelf)}</span>` : '')
      + `<span class="badge ${lent ? 'out' : 'ok'}">${lent ? t('lent') : t('available')}</span>`
      + `</div></div></div>`;
  }

  function renderPagination(tp) {
    const el = document.getElementById('pagination');
    if (tp <= 1) { el.innerHTML = ''; return; }
    let h = `<button ${currentPage <= 1 ? 'disabled' : ''} data-d="-1">‹</button>`;
    for (const p of paginate(currentPage, tp, 7)) {
      h += p === '...' ? '<span class="page-info">…</span>' : `<button class="pg-num${p === currentPage ? ' current' : ''}" data-p="${p}">${p}</button>`;
    }
    h += `<button ${currentPage >= tp ? 'disabled' : ''} data-d="1">›</button>`;
    el.innerHTML = h;
    el.querySelectorAll('button').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.dataset.d) currentPage += parseInt(btn.dataset.d);
        else if (btn.dataset.p) currentPage = parseInt(btn.dataset.p);
        renderList();
      });
    });
  }

  function paginate(cur, total, max) {
    if (total <= max) return Array.from({ length: total }, (_, i) => i + 1);
    const pages = [1];
    const s = Math.max(2, cur - 1), e = Math.min(total - 1, cur + 1);
    if (s > 2) pages.push('...');
    for (let i = s; i <= e; i++) pages.push(i);
    if (e < total - 1) pages.push('...');
    pages.push(total);
    return pages;
  }

  // Modal
  let curBook = null;
  function openModal(id) {
    const b = allBooks.find((x) => x.id === id);
    if (!b) return;
    curBook = b;
    document.getElementById('modal-title').textContent = b.title || '(—)';
    document.getElementById('modal-author').textContent = b.author || '—';
    const te = document.getElementById('modal-thumb');
    te.innerHTML = b.thumbnailUrl ? `<img src="${esc(b.thumbnailUrl)}" alt="">` : '';
    te.style.display = b.thumbnailUrl ? '' : 'none';
    const rows = [
      [t('isbn'), b.isbn], [t('publisher'), b.publisher], [t('pubdateDetail'), b.pubdate],
      [t('genre'), b.genre], [t('language'), b.language], [t('shelfDetail'), b.shelf],
      [t('regDate'), b.registeredAt]
    ];
    if (b.note) rows.push([t('note'), b.note]);
    document.getElementById('detail-table').innerHTML = rows.map((r) => `<tr><td>${r[0]}</td><td>${esc(r[1] || '—')}</td></tr>`).join('');
    document.getElementById('lending-status').value = b.status || '在庫';
    document.getElementById('lending-borrower').value = b.borrower || '';
    toggleBorrowerRow();
    document.getElementById('lending-status').onchange = toggleBorrowerRow;
    document.getElementById('modal-bg').classList.add('open');
  }
  function closeModal() { document.getElementById('modal-bg').classList.remove('open'); curBook = null; }
  function toggleBorrowerRow() { document.getElementById('borrower-row').style.display = document.getElementById('lending-status').value === '貸出中' ? 'flex' : 'none'; }

  function saveLending() {
    if (!curBook) return;
    const book = curBook;
    const prev = { status: book.status, borrower: book.borrower, updatedAt: book.updatedAt };
    const s = document.getElementById('lending-status').value;
    const borrower = document.getElementById('lending-borrower').value.trim();
    // 楽観更新して即閉じる。サーバー失敗時は巻き戻してトーストで通知
    book.status = s;
    book.borrower = s === '貸出中' ? borrower : '';
    book.updatedAt = new Date().toLocaleString('ja-JP');
    closeModal(); renderList();
    const rollback = (err) => {
      book.status = prev.status; book.borrower = prev.borrower; book.updatedAt = prev.updatedAt;
      renderList();
      toast(t('updateFail') + (err ? `: ${err}` : ''), 'error');
    };
    if (isGAS) {
      gasRun('updateBookById', book.id, { status: s, borrower: book.borrower }).then((res) => {
        if (res && res.success) toast(t('updated'), 'ok');
        else rollback(res && res.error);
      }, (e) => rollback(e && e.message));
    } else {
      toast(t('updated'), 'ok');
    }
  }

  // ============================================================
  // REGISTER VIEW
  // ============================================================
  function initRegisterView() {
    if (shelves.length) renderShelves();
    else loadShelves(() => renderShelves());
  }

  function bindRegisterEvents() {
    document.getElementById('btn-back').addEventListener('click', () => { updateFilterOptions(); applyFilters(); showView('list'); });
    document.getElementById('tab-barcode').addEventListener('click', () => setMode('barcode'));
    document.getElementById('tab-manual').addEventListener('click', () => setMode('manual'));
    document.getElementById('btn-scan-start').addEventListener('click', startScan);
    document.getElementById('btn-fetch-isbn').addEventListener('click', fetchIsbnForManual);
    document.getElementById('btn-manual-register').addEventListener('click', submitManualForm);
  }

  function setMode(m) {
    document.getElementById('tab-barcode').classList.toggle('active', m === 'barcode');
    document.getElementById('tab-manual').classList.toggle('active', m === 'manual');
    document.getElementById('panel-barcode').style.display = m === 'barcode' ? '' : 'none';
    document.getElementById('panel-manual').style.display = m === 'manual' ? '' : 'none';
  }

  function renderShelves() {
    const pf = [], nm = [];
    for (const s of shelves) {
      const p = s.split('-');
      if (p.length !== 2) continue;
      if (pf.indexOf(p[0]) === -1) pf.push(p[0]);
      if (nm.indexOf(p[1]) === -1) nm.push(p[1]);
    }
    pf.sort();
    nm.sort((a, b) => parseInt(a) - parseInt(b));
    const pe = document.getElementById('shelf-prefix'), ne = document.getElementById('shelf-number');
    pe.innerHTML = pf.map((p) => `<option>${p}</option>`).join('');
    ne.innerHTML = nm.map((n) => `<option>${n}</option>`).join('');
    const upd = () => {
      selectedShelf = `${pe.value}-${ne.value}`;
      document.getElementById('shelf-display').textContent = selectedShelf;
    };
    pe.onchange = upd; ne.onchange = upd;
    if (pf.length && nm.length) { pe.value = pf[0]; ne.value = nm[0]; upd(); }
  }

  // Scanner — window.open + document.write (bypasses GAS iframe sandbox)
  // スキャン結果はキューに積み、1件ずつ順番にサーバーへ送る。
  // 登録中に次の本をスキャンしても消えない。
  const scanItems = []; // { isbn, title, author, status: 'queued'|'sending'|'ok'|'error', error } 新しい順
  let scanProcessing = false;

  // Listen for barcode results from scanner popup
  window.addEventListener('message', (e) => {
    if (!e.data || e.data.type !== 'barcode-scanned' || !e.data.value) return;
    const code = e.data.value;

    if (!/^97[89]\d{10}$/.test(code)) {
      const st = document.getElementById('barcode-status');
      st.textContent = `${t('notIsbn')}: ${code}`;
      st.className = 'scan-status error';
      return;
    }
    scanItems.unshift({ isbn: code, title: '', author: '', status: 'queued', error: '' });
    renderScanItems();
    processScanQueue();
  });

  function processScanQueue() {
    if (scanProcessing) return;
    // 配列は新しい順なので、末尾側から古い queued を探す
    let item = null;
    for (let i = scanItems.length - 1; i >= 0; i--) {
      if (scanItems[i].status === 'queued') { item = scanItems[i]; break; }
    }
    if (!item) return;
    scanProcessing = true;
    item.status = 'sending';
    renderScanItems();
    registerByIsbn(item.isbn, selectedShelf, (res) => {
      if (res && res.success && res.row) {
        item.title = res.row.title || '';
        item.author = res.row.author || '';
        item.status = 'ok';
        allBooks.unshift(res.row); // 一覧へ即反映
      } else {
        item.status = 'error';
        item.error = regErrorText(res);
      }
      scanProcessing = false;
      renderScanItems();
      processScanQueue();
    });
  }

  function renderScanItems() {
    const el = document.getElementById('scan-result');
    el.innerHTML = scanItems.map((it, idx) => {
      let label, cls;
      if (it.status === 'ok') { label = t('registered'); cls = 'ok'; }
      else if (it.status === 'error') { label = t('failed') + (it.error ? `: ${it.error}` : ''); cls = 'error'; }
      else if (it.status === 'sending') { label = t('registering'); cls = 'pending'; }
      else { label = t('queued'); cls = 'pending'; }
      return `<div class="scan-result">`
        + `<div class="sr-title">${esc(it.title || it.isbn)}</div>`
        + `<div class="sr-meta">${it.author ? esc(it.author) + ' / ' : ''}${it.isbn}</div>`
        + `<div class="sr-status ${cls}">${esc(label)}`
        + (it.status === 'error' ? ` <button class="btn-small sr-retry" data-idx="${idx}">${t('retry')}</button>` : '')
        + `</div></div>`;
    }).join('');
    el.querySelectorAll('.sr-retry').forEach((btn) => {
      btn.addEventListener('click', () => {
        const it = scanItems[parseInt(btn.dataset.idx)];
        if (it && it.status === 'error') { it.status = 'queued'; renderScanItems(); processScanQueue(); }
      });
    });
    updateScanSummary();
  }

  function updateScanSummary() {
    const st = document.getElementById('barcode-status');
    if (!scanItems.length) { st.textContent = ''; st.className = 'scan-status'; return; }
    let ok = 0, pend = 0, err = 0;
    for (const it of scanItems) {
      if (it.status === 'ok') ok++;
      else if (it.status === 'error') err++;
      else pend++;
    }
    const parts = [`${t('registered')} ${ok}`];
    if (pend) parts.push(`${t('registering')} ${pend}`);
    if (err) parts.push(`${t('failed')} ${err}`);
    st.textContent = parts.join(' / ');
    st.className = 'scan-status' + (err ? ' error' : (ok && !pend ? ' ok' : ''));
  }

  function buildScannerHTML() {
    return '<!DOCTYPE html><html><head>' +
      '<meta charset="utf-8">' +
      '<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">' +
      '<title>Scan</title>' +
      '<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"><\/script>' +
      '<style>' +
        '*{box-sizing:border-box;margin:0;padding:0}' +
        'body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column}' +
        '.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,.85);position:fixed;top:0;left:0;right:0;z-index:10}' +
        '.hdr h1{font-size:15px;font-weight:600;opacity:.9}' +
        '.cbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;backdrop-filter:blur(8px)}' +
        '#reader{flex:1;margin-top:46px;overflow:hidden}' +
        '#reader video{width:100%!important;height:100%!important;object-fit:contain}' +
        '#msg{position:fixed;bottom:0;left:0;right:0;padding:16px;text-align:center;font-size:16px;font-weight:700;background:rgba(0,0,0,.85);backdrop-filter:blur(8px)}' +
        '#msg.ok{color:#34d399}' +
        '#msg.wait{color:#fbbf24}' +
        '#msg.err{color:#f87171}' +
      '</style></head><body>' +
      '<div class="hdr"><h1>Scan Barcode</h1><button class="cbtn" onclick="done()">✕ Close</button></div>' +
      '<div id="reader"></div>' +
      '<div id="msg" class="wait">Starting camera...</div>' +
      '<script>' +
        'var qr=new Html5Qrcode("reader",{formatsToSupport:[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8],experimentalFeatures:{useBarCodeDetectorIfSupported:true}});' +
        'var sent=false;' +
        'qr.start(' +
          '{facingMode:"environment"},' +
          '{fps:15,qrbox:function(w,h){var s=Math.min(w,h);return{width:Math.floor(s*0.85),height:Math.floor(s*0.35)};},disableFlip:true},' +
          'function(code){' +
            'if(sent)return;sent=true;' +
            'var m=document.getElementById("msg");m.textContent="✓ "+code;m.className="ok";' +
            'try{window.opener.postMessage({type:"barcode-scanned",value:code},"*");}catch(e){}' +
            'qr.stop().catch(function(){});' +
            'setTimeout(function(){window.close();},800);' +
          '},' +
          'function(){}' +
        ').then(function(){' +
          'document.getElementById("msg").textContent="Point at barcode";document.getElementById("msg").className="wait";' +
          'try{var cap=qr.getRunningTrackCameraCapabilities();if(cap&&cap.zoomFeature&&cap.zoomFeature().isSupported()){cap.zoomFeature().apply(2.0).catch(function(){});}}catch(e){}' +
        '})' +
        '.catch(function(e){var m=document.getElementById("msg");m.textContent="Camera error: "+e;m.className="err";});' +
        'function done(){try{qr.stop().catch(function(){});}catch(e){}window.close();}' +
      '<\/script></body></html>';
  }

  function startScan() {
    const st = document.getElementById('barcode-status');
    if (!scanItems.length) { st.textContent = ''; st.className = 'scan-status'; }

    const win = window.open('', '_blank');
    if (win) {
      win.document.write(buildScannerHTML());
      win.document.close();
    } else {
      st.textContent = `${t('cameraFail')}: ポップアップがブロックされました。サイトのポップアップを許可してください。`;
      st.className = 'scan-status error';
    }
  }

  // Manual
  function resetManualForm() {
    for (const id of ['man-isbn','man-title','man-author','man-publisher','man-pubdate','man-genre','man-note']) {
      document.getElementById(id).value = '';
    }
    document.getElementById('man-language').value = 'ja';
    document.getElementById('man-fetch-status').textContent = '';
    document.getElementById('man-register-status').textContent = '';
  }

  // ISBN検索 → ヒットすればその場で登録（API経由なのでLibraryシート行き）
  // 未ヒット時のみ手動フォームで登録してもらう
  function fetchIsbnForManual() {
    const isbn = document.getElementById('man-isbn').value.trim();
    if (!isbn) return;
    const st = document.getElementById('man-fetch-status');
    const btn = document.getElementById('btn-fetch-isbn');
    if (!selectedShelf) { st.textContent = t('selectShelf'); st.className = 'fetch-status error'; return; }
    st.textContent = t('registering'); st.className = 'fetch-status'; btn.disabled = true;
    registerByIsbn(isbn, selectedShelf, (res) => {
      btn.disabled = false;
      if (res.success && res.row) {
        allBooks.unshift(res.row);
        resetManualForm();
        toast(`${t('regComplete')}: ${res.row.title || isbn}`, 'ok');
      } else {
        let msg = regErrorText(res);
        if (msg === t('errNoHit')) msg = t('notFoundManual');
        st.textContent = msg; st.className = 'fetch-status error';
      }
    });
  }

  function submitManualForm() {
    const isbn = document.getElementById('man-isbn').value.trim();
    const title = document.getElementById('man-title').value.trim();
    const st = document.getElementById('man-register-status');
    if (!isbn && !title) { st.textContent = t('isbnOrTitleReq'); st.className = 'fetch-status error'; return; }
    if (!selectedShelf) { st.textContent = t('selectShelf'); st.className = 'fetch-status error'; return; }
    const data = {
      isbn: isbn,
      title: title,
      author: document.getElementById('man-author').value.trim(),
      publisher: document.getElementById('man-publisher').value.trim(),
      pubdate: document.getElementById('man-pubdate').value.trim(),
      genre: document.getElementById('man-genre').value.trim(),
      language: document.getElementById('man-language').value.trim(),
      shelf: selectedShelf,
      note: document.getElementById('man-note').value.trim()
    };
    const btn = document.getElementById('btn-manual-register');
    btn.disabled = true; btn.textContent = t('registering');
    registerManual(data, (res) => {
      btn.disabled = false; btn.textContent = t('registerBtn');
      if (res.success && res.row) {
        allBooks.unshift(res.row);
        resetManualForm();
        toast(`${t('regComplete')}: ${data.title || data.isbn}`, 'ok');
      } else {
        st.textContent = regErrorText(res); st.className = 'fetch-status error';
      }
    });
  }

  // Util
  function toast(msg, type) {
    let wrap = document.getElementById('toast-wrap');
    if (!wrap) { wrap = document.createElement('div'); wrap.id = 'toast-wrap'; document.body.appendChild(wrap); }
    const el = document.createElement('div');
    el.className = 'toast' + (type ? ` ${type}` : '');
    el.textContent = msg;
    wrap.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000);
  }

  function extractYear(d) {
    if (!d) return '';
    const m = d.match(/(\d{4})/);
    return m ? m[1] : d;
  }

  // 属性値内でも使うため引用符もエスケープする
  const ESC_MAP = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };
  function esc(s) {
    if (s == null || s === '') return '';
    return String(s).replace(/[&<>"']/g, (c) => ESC_MAP[c]);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
